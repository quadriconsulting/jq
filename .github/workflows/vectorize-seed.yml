name: Vectorize RAG Docs (Seed)

on:
  workflow_dispatch:
  push:
    paths:
      - "rag_docs/**"
      - "scripts/vectorize_seed.py"
      - "scripts/requirements.txt"
      - ".github/workflows/vectorize-seed.yml"

concurrency:
  group: vectorize-seed
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VEC_INDEX_NAME: ${{ secrets.VEC_INDEX_NAME }}

      # chunking knobs
      CHUNK_SIZE: "2200"
      CHUNK_OVERLAP: "350"
      UPSERT_BATCH: "64"

      # local cache path (persisted via actions/cache)
      CACHE_DB: ".cache/vector_cache.sqlite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: Cache embedding sqlite
        uses: actions/cache@v4
        with:
          path: .cache
          key: vec-cache-${{ runner.os }}-${{ hashFiles('rag_docs/**') }}
          restore-keys: |
            vec-cache-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Ensure Vectorize metadata index for 'type'
        # Idempotent: 409 = already exists, treated as success.
        # Vectors seeded before this index existed must be re-upserted
        # — the "Seed Vectorize" step below handles that automatically.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/vectorize/v2/indexes/${VEC_INDEX_NAME}/metadata_index/create" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"propertyName":"type","indexType":"string"}')
          echo "Metadata index create status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ]; then
            echo "Metadata index for 'type' is ready."
          else
            echo "Unexpected status $STATUS — check token permissions or index name."
            exit 1
          fi
   
      - name: Seed Vectorize
        run: |
          python scripts/vectorize_seed.py

      - name: Summary
        if: always()
        run: |
          echo "Seed run finished."
