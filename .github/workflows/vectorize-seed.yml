name: Vectorize RAG Docs (Seed)

on:
  workflow_dispatch:
  push:
    paths:
      - "rag_docs/**"
      - "cv.md"
      - "cv_qa.md"
      - "cv_facts.md"
      - "projects.md"
      - "projects_qa.md"
      - "projects_facts.md"
      - "fam.md"
      - "scripts/vectorize_seed.py"
      - "scripts/requirements.txt"

concurrency:
  group: vectorize-seed
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VEC_INDEX_NAME: ${{ secrets.VEC_INDEX_NAME }}

      # chunking knobs
      CHUNK_SIZE: "2200"
      CHUNK_OVERLAP: "350"
      UPSERT_BATCH: "64"

      # local cache path (persisted via actions/cache)
      CACHE_DB: ".cache/vector_cache.sqlite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: Cache embedding sqlite
        uses: actions/cache@v4
        with:
          path: .cache
          key: vec-cache-${{ runner.os }}-${{ hashFiles('rag_docs/**', 'public/rag_docs/**', 'cv*.md', 'projects*.md', 'fam.md') }}
          restore-keys: |
            vec-cache-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Seed Vectorize
        run: |
          python scripts/vectorize_seed.py

      - name: Summary
        if: always()
        run: |
          echo "Seed run finished."
